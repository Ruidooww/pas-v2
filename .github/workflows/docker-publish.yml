name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish. Defaults to the commit SHA."
        required: false
        type: string
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
      REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
      REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve publish configuration
        id: publish
        shell: bash
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: |
          if [ -z "$REGISTRY_HOST" ] || [ -z "$REGISTRY_NAMESPACE" ] || [ -z "$REGISTRY_USERNAME" ] || [ -z "$REGISTRY_PASSWORD" ]; then
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "::error::Registry settings are incomplete. Configure REGISTRY_HOST, REGISTRY_NAMESPACE, REGISTRY_USERNAME, and REGISTRY_PASSWORD."
              exit 1
            fi

            echo "::notice::Registry settings are incomplete; skipping image publish for this push."
            echo "publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Login to OCI registry
        if: steps.publish.outputs.publish == 'true'
        shell: bash
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "$REGISTRY_HOST" \
            --username "${{ secrets.REGISTRY_USERNAME }}" \
            --password-stdin

      - name: Build and push images
        if: steps.publish.outputs.publish == 'true'
        run: pnpm ci:images
        env:
          PUSH_IMAGES: "1"
