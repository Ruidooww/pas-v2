name: Docker Publish

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to publish. Defaults to the commit SHA."
        required: false
        type: string
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  docker-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      IMAGE_TAG: ${{ inputs.image_tag || github.sha }}
      REGISTRY_HOST: ${{ vars.REGISTRY_HOST }}
      REGISTRY_NAMESPACE: ${{ vars.REGISTRY_NAMESPACE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify release inputs
        shell: bash
        run: |
          test -n "$REGISTRY_HOST"
          test -n "$REGISTRY_NAMESPACE"
          test -n "${{ secrets.REGISTRY_USERNAME }}"
          test -n "${{ secrets.REGISTRY_PASSWORD }}"

      - name: Login to OCI registry
        shell: bash
        run: |
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login "$REGISTRY_HOST" \
            --username "${{ secrets.REGISTRY_USERNAME }}" \
            --password-stdin

      - name: Build and push images
        run: pnpm ci:images
        env:
          PUSH_IMAGES: "1"
