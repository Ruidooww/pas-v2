name: pas-v2

services:
  pas-frontend:
    container_name: pas-frontend
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    depends_on:
      pas-backend:
        condition: service_started
    ports:
      - "${PAS_FRONTEND_PORT:-18000}:80"
    networks:
      - pas
    restart: unless-stopped

  pas-backend:
    container_name: pas-backend
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PAS_BACKEND_PORT_INTERNAL:-3000}
      DATABASE_URL: ${DATABASE_URL:-postgresql://pas:change-me@pas-postgres:5432/pas?schema=public}
      REDIS_URL: ${REDIS_URL:-redis://pas-redis:6379}
      FILE_STORAGE_DRIVER: ${FILE_STORAGE_DRIVER:-local}
      FILE_STORAGE_ROOT: ${FILE_STORAGE_ROOT:-/data/pas-files}
      RAGFLOW_BASE_URL: ${RAGFLOW_BASE_URL:-http://host.docker.internal:19380}
      RAGFLOW_CLIENT_MODE: ${RAGFLOW_CLIENT_MODE:-real}
      PAS_KB_ID: ${PAS_KB_ID:-}
      QA_KB_ID: ${QA_KB_ID:-}
    depends_on:
      pas-postgres:
        condition: service_healthy
      pas-redis:
        condition: service_healthy
    expose:
      - "${PAS_BACKEND_PORT_INTERNAL:-3000}"
    volumes:
      - pas_backend_files:/data/pas-files
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - pas
    restart: unless-stopped

  pas-postgres:
    container_name: pas-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pas}
      POSTGRES_USER: ${POSTGRES_USER:-pas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - pas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pas
    restart: unless-stopped

  pas-redis:
    container_name: pas-redis
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - pas_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - pas
    restart: unless-stopped

networks:
  pas:
    name: pas-v2

volumes:
  pas_backend_files:
  pas_postgres_data:
  pas_redis_data:
